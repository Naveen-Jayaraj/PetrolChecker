<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KM Left Widget</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { background-color: transparent; }
    .widget-container { padding: 16px; border-radius: 20px; background-color: var(--surface-color); border: 1px solid var(--border-color); text-align: center; }
    h3 { color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 8px; }
    .val { font-size: 2rem; font-weight: bold; color: var(--accent-color); }
  </style>
</head>
<body>
  <div class="widget-container">
    <h3>Range Left</h3>
    <div class="val" id="val">Loading...</div>
  </div>
  <script>
    // Simple fetch from localStorage
    try {
      const state = JSON.parse(localStorage.getItem('petrol_tracker_state'));
      if (state && state.vehicles && state.vehicles.length > 0) {
        const v = state.vehicles.find(v => v.id === state.activeVehicleId) || state.vehicles[0];
        const range = v.lastRefillRange || 0;
        const currentOdo = v.odometer || 0;
        const lastOdo = v.lastRefillOdo || 0;
        let left = Math.max(0, (lastOdo + range) - currentOdo);
        document.getElementById('val').innerText = left.toFixed(1) + ' km';
      }
    } catch(e) {}
  </script>
</body>
</html>
