<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Sage gradients matching the theme -->
    <linearGradient id="leaf-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8eb695" />
      <stop offset="100%" stop-color="#44634d" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="#0e1410" />
  
  <!-- Outer organic ring -->
  <rect x="24" y="24" width="464" height="464" rx="112" fill="none" stroke="#8eb695" stroke-width="4" opacity="0.15" />
  
  <!-- Stylized leaf + fuel drop icon in the center -->
  <g transform="translate(128, 112)">
    <!-- Droplet / leaf contour -->
    <!-- Left side of the drop/leaf -->
    <path d="M 128 32 C 128 32, 28 132, 28 200 C 28 256, 73 288, 128 288 C 183 288, 228 256, 228 200 C 228 132, 128 32, 128 32 Z" 
          fill="url(#leaf-grad)" />
          
    <!-- Leaf veins inside the droplet (white outline for premium organic design contrast) -->
    <!-- Center stem -->
    <path d="M 128 64 L 128 260" stroke="#f2f6f3" stroke-width="6" stroke-linecap="round" opacity="0.7" />
    
    <!-- Left diagonal veins -->
    <path d="M 128 130 C 100 140, 70 160, 60 190" fill="none" stroke="#f2f6f3" stroke-width="5" stroke-linecap="round" opacity="0.6" />
    <path d="M 128 180 C 100 190, 80 210, 75 235" fill="none" stroke="#f2f6f3" stroke-width="5" stroke-linecap="round" opacity="0.6" />
    
    <!-- Right diagonal veins -->
    <path d="M 128 130 C 156 140, 186 160, 196 190" fill="none" stroke="#f2f6f3" stroke-width="5" stroke-linecap="round" opacity="0.6" />
    <path d="M 128 180 C 156 190, 176 210, 181 235" fill="none" stroke="#f2f6f3" stroke-width="5" stroke-linecap="round" opacity="0.6" />
    
    <!-- A small fuel drop detail at the top tip -->
    <circle cx="128" cy="20" r="8" fill="#8eb695" />
  </g>
</svg>
